name: ruisi_flutter
description: "睿思论坛 Flutter 客户端 - 西安电子科技大学校园论坛"
publish_to: "none"

version: 2.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  # 网络请求
  dio: ^5.0.0
  dio_cookie_manager: ^3.4.0
  cookie_jar: ^4.0.9
  crypto: ^3.0.7
  # 本地存储
  shared_preferences: ^2.3.0
  path_provider: ^2.1.5
  file_picker: ^12.0.0-beta.5
  # 状态管理
  get_it: ^9.2.1
  infinite_scroll_pagination: ^5.1.1
  # HTML 解析
  html: ^0.15.0
  # 状态管理
  provider: ^6.1.0
  # 路由
  go_router: ^17.2.3
  # 图片
  cached_network_image: ^3.4.0
  # HTML 渲染
  flutter_html: ^3.0.0
  # URL 启动
  url_launcher: ^6.3.0
  # 收藏动画
  flutter_widget_from_html: ^0.17.2
  # 日志
  talker: ^5.1.17
  talker_dio_logger: ^5.1.17
  talker_flutter: ^5.1.17

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  rename: ^3.1.0

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/forums.json
    - assets/smiley.json
    - assets/smiley/
    - assets/smiley/acn/
    - assets/smiley/comcom/
    - assets/smiley/default/
    - assets/smiley/jgz/
    - assets/smiley/qiubilong/
    - assets/smiley/tieba/
