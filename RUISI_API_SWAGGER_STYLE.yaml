      summary: 获取板块帖子列表 JSON
      description: |
        这是 Discuz mobile API 形式的 JSON 接口。
        当前客户端代码中定义了它，但主流程实际很少使用。
      operationId: getMobileForumThreads
      x-ruisi-origin:
        method: GET
        path: /api/mobile/index.php
        query:
          version: 4
          module: forumdisplay
          fid: "{fid}"
          page: "{page}"
      x-ruisi-source:
        - app/src/main/java/me/yluo/ruisiapp/utils/UrlUtils.java:28
        - app/src/main/java/me/yluo/ruisiapp/activity/PostsActivity.java:442
      parameters:
        - $ref: "#/components/parameters/Fid"
        - $ref: "#/components/parameters/Page"
      responses:
        "200":
          description: 板块 JSON 列表
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MobileApiForumdisplayResponse"

  /mobile-api/threads/{tid}:
    get:
      tags: [MobileAPI]
      summary: 获取主题详情 JSON
      description: 当前客户端定义了 URL，但主流程解析仍以 HTML 详情页为主。
      operationId: getMobileThreadDetail
      x-ruisi-origin:
        method: GET
        path: /api/mobile/index.php
        query:
          version: 4
          module: viewthread
          tid: "{tid}"
          page: "{page}"
          ppp: "{pageSize}"
      x-ruisi-source:
        - app/src/main/java/me/yluo/ruisiapp/utils/UrlUtils.java:32
      parameters:
        - $ref: "#/components/parameters/Tid"
        - $ref: "#/components/parameters/Page"
        - name: pageSize
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: 主题详情 JSON
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
